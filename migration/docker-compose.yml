version: '3.8'

# DigiWebDex Docker Compose - Isolated Deployment
# All services run in an isolated network with project-specific names

services:
  # PostgreSQL Database (isolated)
  postgres:
    image: postgres:15-alpine
    container_name: digiwebdex-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-digiwebdex_db}
      POSTGRES_USER: ${DB_USER:-digiwebdex_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Database password required}
    volumes:
      - digiwebdex_postgres_data:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:${DB_PORT:-5433}:5432"  # Only localhost, unique port
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-digiwebdex_user} -d ${DB_NAME:-digiwebdex_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - digiwebdex-internal
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Backend API Server (isolated)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: digiwebdex-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-digiwebdex_db}
      DB_USER: ${DB_USER:-digiwebdex_user}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET:?JWT secret required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      FRONTEND_URL: ${FRONTEND_URL:-https://digiwebdex.com}
      RESEND_API_KEY: ${RESEND_API_KEY}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-digiwebdex@gmail.com}
      SMS_API_KEY: ${SMS_API_KEY:-}
      SMS_SENDER_ID: ${SMS_SENDER_ID:-DigiWebDex}
      LOG_DIR: /app/logs
    volumes:
      - digiwebdex_uploads:/app/uploads
      - ./logs/backend:/app/logs
    ports:
      - "127.0.0.1:${BACKEND_PORT:-3001}:3001"  # Only localhost
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - digiwebdex-internal
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# Named volumes (project-specific names to avoid conflicts)
volumes:
  digiwebdex_postgres_data:
    name: digiwebdex_postgres_data
  digiwebdex_uploads:
    name: digiwebdex_uploads

# Isolated network (project-specific)
networks:
  digiwebdex-internal:
    name: digiwebdex-network
    driver: bridge
