version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: digiwebdex-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-digiwebdex}
      POSTGRES_USER: ${DB_USER:-digiwebdex_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Database password required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-digiwebdex_user} -d ${DB_NAME:-digiwebdex}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - digiwebdex-network

  # Backend API Server
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: digiwebdex-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-digiwebdex}
      DB_USER: ${DB_USER:-digiwebdex_user}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET:?JWT secret required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      FRONTEND_URL: ${FRONTEND_URL:-https://digiwebdex.com}
      RESEND_API_KEY: ${RESEND_API_KEY}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-digiwebdex@gmail.com}
      SMS_API_KEY: ${SMS_API_KEY}
      SMS_SENDER_ID: ${SMS_SENDER_ID:-DigiWebDex}
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "127.0.0.1:3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - digiwebdex-network

  # Frontend (Nginx serving built React app)
  frontend:
    image: nginx:alpine
    container_name: digiwebdex-frontend
    restart: unless-stopped
    volumes:
      - ../dist:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - digiwebdex-network

volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local

networks:
  digiwebdex-network:
    driver: bridge
