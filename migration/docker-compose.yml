version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: digiwebdex-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: digiwebdex
      POSTGRES_USER: digiwebdex
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U digiwebdex"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: digiwebdex-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=digiwebdex
      - DB_USER=digiwebdex
      - DB_PASSWORD=${DB_PASSWORD:-changeme}
      - JWT_SECRET=${JWT_SECRET}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - SMS_API_KEY=${SMS_API_KEY}
      - SMS_SENDER_ID=${SMS_SENDER_ID}
    ports:
      - "3001:3001"
    volumes:
      - uploads_data:/app/uploads

  frontend:
    build:
      context: ../
      dockerfile: migration/Dockerfile.frontend
    container_name: digiwebdex-web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
  uploads_data:
