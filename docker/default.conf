# Digiwebdex Server Configuration
# Virtual host configuration for digiwebdex.com

server {
    listen 80;
    listen [::]:80;
    server_name digiwebdex.com www.digiwebdex.com;
    
    # Root directory
    root /usr/share/nginx/html;
    index index.html;

    # Security headers (include from snippet)
    include /etc/nginx/snippets/security-headers.conf;

    # Rate limiting
    limit_req zone=general burst=20 nodelay;
    limit_conn addr 10;

    # Health check endpoint
    location /health {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # API rate limiting (stricter)
    location /api/ {
        limit_req zone=api burst=50 nodelay;
        include /etc/nginx/snippets/security-headers.conf;
        try_files $uri $uri/ /index.html;
    }

    # Auth endpoints (very strict rate limiting)
    location ~ ^/(bn|en)/auth/ {
        limit_req zone=login burst=5 nodelay;
        include /etc/nginx/snippets/security-headers.conf;
        try_files $uri $uri/ /index.html;
    }

    # Static assets with long cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff";
        access_log off;
    }

    # Sitemap and robots
    location = /sitemap.xml {
        proxy_pass https://qszmmysnwjvywpsofbgs.supabase.co/functions/v1/sitemap-xml;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        expires 1h;
    }

    location = /robots.txt {
        proxy_pass https://qszmmysnwjvywpsofbgs.supabase.co/functions/v1/robots-txt;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        expires 1d;
    }

    # Block sensitive files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ ^/(\.env|\.git|\.svn|\.hg) {
        deny all;
        return 404;
    }

    # SPA fallback - serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
        
        # Cache HTML for short time
        location ~* \.html$ {
            expires 5m;
            add_header Cache-Control "public, must-revalidate";
        }
    }

    # Error pages
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}

# Redirect www to non-www
server {
    listen 80;
    listen [::]:80;
    server_name www.digiwebdex.com;
    return 301 https://digiwebdex.com$request_uri;
}
